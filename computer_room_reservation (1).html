<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컴퓨터실 예약</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #ededea;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9b9b96;
    --text-info: #185fa5;
    --text-danger: #a32d2d;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --border-info: rgba(24,95,165,0.4);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --bg-info: #0c2340;
      --text-primary: #f0efe8;
      --text-secondary: #a0a09a;
      --text-tertiary: #6b6b65;
      --text-info: #85b7eb;
      --text-danger: #f09595;
      --border-tertiary: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.2);
      --border-info: rgba(133,183,235,0.4);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  h1 { font-size: 20px; font-weight: 500; }

  #sync-status {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .nav button {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-primary);
    font-family: var(--font-sans);
  }

  .nav button:hover { background: var(--bg-secondary); }

  .week-label {
    font-size: 14px;
    font-weight: 500;
    min-width: 180px;
    text-align: center;
  }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    align-items: center;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .table-wrap { overflow-x: auto; background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-tertiary); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 8px 4px;
    text-align: center;
    border: 0.5px solid var(--border-tertiary);
    background: var(--bg-secondary);
  }

  td {
    border: 0.5px solid var(--border-tertiary);
    vertical-align: top;
    padding: 3px;
  }

  .period-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 4px 6px;
    text-align: center;
    background: var(--bg-secondary);
    white-space: nowrap;
    width: 52px;
  }

  .cell {
    min-height: 52px;
    cursor: pointer;
    border-radius: 6px;
    padding: 3px;
    transition: background 0.12s;
  }

  .cell:hover { background: var(--bg-secondary); }
  .cell.today-col { background: rgba(23,93,205,0.04); }

  .entry {
    font-size: 11px;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }

  .entry .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 80px;
  }

  .entry .del {
    cursor: pointer;
    opacity: 0.5;
    font-size: 10px;
    flex-shrink: 0;
    background: none;
    border: none;
    font-family: var(--font-sans);
    padding: 0;
  }

  .entry .del:hover { opacity: 1; }

  .add-btn {
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: center;
    padding: 2px;
  }

  .weekend { color: var(--text-danger) !important; }

  .today-marker {
    display: inline-block;
    background: var(--bg-info);
    color: var(--text-info);
    border-radius: 4px;
    font-size: 10px;
    padding: 1px 5px;
    margin-left: 4px;
  }

  .status-bar {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
    text-align: right;
  }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 300px;
    max-width: 90vw;
  }

  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }

  .modal .sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .modal input,
  .modal select {
    width: 100%;
    padding: 8px 10px;
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    font-size: 14px;
    background: var(--bg-primary);
    color: var(--text-primary);
    margin-bottom: 10px;
    font-family: var(--font-sans);
  }

  .modal-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .modal-btns button {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-md);
    font-size: 13px;
    cursor: pointer;
    border: 0.5px solid var(--border-secondary);
    background: transparent;
    color: var(--text-primary);
    font-family: var(--font-sans);
  }

  .modal-btns .confirm {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: var(--border-info);
  }

  .modal-btns button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🖥️ 컴퓨터실 예약</h1>
    <div id="sync-status"></div>
  </div>

  <div class="nav">
    <button id="prev">◀ 이전주</button>
    <div class="week-label" id="week-label"></div>
    <button id="next">다음주 ▶</button>
    <button id="today-btn" style="margin-left:auto">오늘</button>
  </div>

  <div class="legend">
    <span>선생님 색상:</span>
    <div class="legend-item"><div class="dot" style="background:#5B9FE0"></div><span>파랑</span></div>
    <div class="legend-item"><div class="dot" style="background:#2BB891"></div><span>초록</span></div>
    <div class="legend-item"><div class="dot" style="background:#F5A623"></div><span>노랑</span></div>
    <div class="legend-item"><div class="dot" style="background:#E8729A"></div><span>분홍</span></div>
    <div class="legend-item"><div class="dot" style="background:#8E8E86"></div><span>회색</span></div>
  </div>

  <div class="table-wrap">
    <table id="cal"></table>
  </div>
  <div class="status-bar" id="status"></div>

</div>

<!-- Modal -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="m-title"></h3>
    <div class="sub" id="m-sub"></div>
    <input id="m-name" placeholder="이름 (예: 홍길동 선생님)" maxlength="20"/>
    <input id="m-subject" placeholder="수업 과목 (예: 정보, 과학)" maxlength="20"/>
    <select id="m-color">
      <option value="blue">파랑</option>
      <option value="teal">초록</option>
      <option value="amber">노랑</option>
      <option value="pink">분홍</option>
      <option value="gray">회색</option>
    </select>
    <div class="modal-btns">
      <button id="m-cancel">취소</button>
      <button class="confirm" id="m-confirm">예약하기</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['월','화','수','목','금','토','일'];
const PERIODS = ['1교시','2교시','3교시','4교시','5교시','6교시','7교시'];
const COLORS = {
  blue:  {bg:'#5B9FE0', text:'#ffffff'},
  teal:  {bg:'#2BB891', text:'#ffffff'},
  amber: {bg:'#F5A623', text:'#ffffff'},
  pink:  {bg:'#E8729A', text:'#ffffff'},
  gray:  {bg:'#8E8E86', text:'#ffffff'}
};

const STORAGE_KEY = 'computer_room_reservations';
let weekOffset = 0;
let reservations = {};
let modal = null;

function getMonday(offset = 0) {
  const d = new Date();
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff + offset * 7);
  d.setHours(0, 0, 0, 0);
  return d;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) reservations = JSON.parse(raw);
  } catch(e) { reservations = {}; }
  render();
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations));
    const s = document.getElementById('sync-status');
    s.textContent = '✓ 저장됨';
    setTimeout(() => s.textContent = '', 2000);
  } catch(e) {
    document.getElementById('sync-status').textContent = '저장 실패';
  }
}

function render() {
  const mon = getMonday(weekOffset);
  const days = Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(d.getDate() + i);
    return d;
  });
  const endSun = days[6];
  document.getElementById('week-label').textContent =
    `${mon.getMonth()+1}월 ${mon.getDate()}일 ~ ${endSun.getMonth()+1}월 ${endSun.getDate()}일`;

  const cal = document.getElementById('cal');
  let html = '<thead><tr><th style="width:52px">교시</th>';
  days.forEach((d, i) => {
    const todayMark = isToday(d) ? '<span class="today-marker">오늘</span>' : '';
    const wkCls = i >= 5 ? 'class="weekend"' : '';
    html += `<th ${wkCls}>${DAYS[i]}<br><span style="font-size:13px;font-weight:400">${d.getMonth()+1}/${d.getDate()}${todayMark}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  let totalCount = 0;
  PERIODS.forEach((p, pi) => {
    html += `<tr><td class="period-label">${p}</td>`;
    days.forEach((d, di) => {
      const key = `${fmtDate(d)}_${pi}`;
      const entries = reservations[key] || [];
      totalCount += entries.length;
      const todayCls = isToday(d) ? 'today-col' : '';
      html += `<td><div class="cell ${todayCls}" data-key="${key}" data-period="${pi}" data-pname="${p}" data-dname="${DAYS[di]} ${d.getMonth()+1}/${d.getDate()}">`;
      entries.forEach((e, ei) => {
        const c = COLORS[e.color] || COLORS.blue;
        html += `<div class="entry" style="background:${c.bg};color:${c.text}">
          <span class="name" title="${e.name}${e.subject ? ' (' + e.subject + ')' : ''}">${e.name}${e.subject ? ' · ' + e.subject : ''}</span>
          <button class="del" data-key="${key}" data-idx="${ei}" style="color:${c.text}">✕</button>
        </div>`;
      });
      if (entries.length < 4) html += `<div class="add-btn">＋</div>`;
      html += `</div></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  cal.innerHTML = html;

  document.getElementById('status').textContent = totalCount > 0
    ? `이번 주 전체 ${totalCount}건 예약됨` : '이번 주 예약 없음';

  cal.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', e => {
      if (e.target.classList.contains('del') || e.target.closest('.del')) return;
      openModal(cell.dataset.key, cell.dataset.period, cell.dataset.pname, cell.dataset.dname);
    });
  });

  cal.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteEntry(btn.dataset.key, parseInt(btn.dataset.idx));
    });
  });
}

function openModal(key, period, pname, dname) {
  const entries = reservations[key] || [];
  if (entries.length >= 4) { alert('해당 교시는 최대 4건까지 예약 가능합니다.'); return; }
  modal = { key };
  document.getElementById('m-title').textContent = `${dname} ${pname} 예약`;
  document.getElementById('m-sub').textContent = '이름과 과목을 입력하고 예약해주세요';
  document.getElementById('m-name').value = '';
  document.getElementById('m-subject').value = '';
  document.getElementById('m-color').value = 'blue';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('m-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  modal = null;
}

function confirmModal() {
  const name = document.getElementById('m-name').value.trim();
  const subject = document.getElementById('m-subject').value.trim();
  const color = document.getElementById('m-color').value;
  if (!name) { document.getElementById('m-name').focus(); return; }
  if (!reservations[modal.key]) reservations[modal.key] = [];
  reservations[modal.key].push({ name, subject, color });
  saveData();
  closeModal();
  render();
}

function deleteEntry(key, idx) {
  if (!confirm('예약을 삭제하시겠습니까?')) return;
  reservations[key].splice(idx, 1);
  if (!reservations[key].length) delete reservations[key];
  saveData();
  render();
}

document.getElementById('prev').addEventListener('click', () => { weekOffset--; render(); });
document.getElementById('next').addEventListener('click', () => { weekOffset++; render(); });
document.getElementById('today-btn').addEventListener('click', () => { weekOffset = 0; render(); });
document.getElementById('m-cancel').addEventListener('click', closeModal);
document.getElementById('m-confirm').addEventListener('click', confirmModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('m-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('m-subject').focus(); });
document.getElementById('m-subject').addEventListener('keydown', e => { if (e.key === 'Enter') confirmModal(); });

loadData();
</script>
</body>
</html>
